<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Homepage</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        header { background-color: #2874f0; padding: 10px; color: white; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 15px; }
        .search-bar { padding: 5px; width: 300px; }
        .cart { font-size: 1.2em; }
        .banner { background-color: #ffcc00; padding: 10px; text-align: center; }
        .featured-products, .categories { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 20px; }
        .product, .category { border: 1px solid #ccc; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>Flipkart</h1>
            <div class="nav-links">
                <input type="text" class="search-bar" placeholder="Search for products...">
                <a class="cart" href="#">🛒 Cart</a>
            </div>
        </nav>
    </header>
    <div class="banner">
        <h2>Promotional Banners Here</h2>
    </div>
    <section class="featured-products">
        <h2>Featured Products</h2>
        <div class="product">Product 1</div>
        <div class="product">Product 2</div>
        <div class="product">Product 3</div>
    </section>
    <section class="categories">
        <h2>Categories</h2>
        <div class="category">Category 1</div>
        <div class="category">Category 2</div>
        <div class="category">Category 3</div>
    </section>
</body>
</html>
